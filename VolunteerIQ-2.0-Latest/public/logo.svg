<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">

  <!-- Heart filled background, split left/right -->
  <!-- Left half heart -->
  <path d="M50 82 C48 80 12 60 12 38 C12 26 21 18 32 18 C39 18 45 22 50 28 L50 82Z" fill="#10B981"/>
  <!-- Right half heart -->
  <path d="M50 82 C52 80 88 60 88 38 C88 26 79 18 68 18 C61 18 55 22 50 28 L50 82Z" fill="#34D399"/>

  <!-- Heart outline -->
  <path d="M50 82 C50 82 12 60 12 38 C12 26 21 18 32 18 C39 18 45 22 50 28 C55 22 61 18 68 18 C79 18 88 26 88 38 C88 60 50 82 50 82Z"
    stroke="white" stroke-width="2" fill="none"/>

  <!-- ══ LEFT HAND — dark green, coming from left, fingers point RIGHT ══ -->
  <!-- Wrist/forearm -->
  <rect x="10" y="52" width="22" height="9" rx="4.5" fill="#059669"/>
  <!-- Palm -->
  <rect x="28" y="46" width="16" height="15" rx="5" fill="#059669"/>
  <!-- Pinky finger -->
  <rect x="40" y="55" width="8" height="6" rx="3" fill="#059669"/>
  <!-- Ring finger -->
  <rect x="40" y="47" width="8" height="7" rx="3.5" fill="#059669"/>
  <!-- Middle finger -->
  <rect x="40" y="38" width="8" height="12" rx="4" fill="#059669"/>
  <!-- Index finger -->
  <rect x="40" y="40" width="8" height="10" rx="4" fill="#059669"/>
  <!-- Thumb -->
  <rect x="26" y="57" width="12" height="6" rx="3" fill="#047857" transform="rotate(-12 26 57)"/>

  <!-- ══ RIGHT HAND — light green, coming from right, fingers point LEFT ══ -->
  <!-- Wrist/forearm -->
  <rect x="68" y="52" width="22" height="9" rx="4.5" fill="#6EE7B7"/>
  <!-- Palm -->
  <rect x="56" y="46" width="16" height="15" rx="5" fill="#6EE7B7"/>
  <!-- Pinky finger -->
  <rect x="52" y="55" width="8" height="6" rx="3" fill="#6EE7B7"/>
  <!-- Ring finger -->
  <rect x="52" y="47" width="8" height="7" rx="3.5" fill="#6EE7B7"/>
  <!-- Middle finger -->
  <rect x="52" y="38" width="8" height="12" rx="4" fill="#6EE7B7"/>
  <!-- Index finger -->
  <rect x="52" y="40" width="8" height="10" rx="4" fill="#6EE7B7"/>
  <!-- Thumb -->
  <rect x="62" y="57" width="12" height="6" rx="3" fill="#10B981" transform="rotate(12 62 57)"/>

  <!-- ══ CLASPED CENTER — where both hands grip ══ -->
  <rect x="42" y="46" width="16" height="15" rx="5" fill="#0D9488"/>
  <!-- Knuckle lines -->
  <rect x="44" y="46" width="3" height="5" rx="1.5" fill="#0F766E"/>
  <rect x="48.5" y="46" width="3" height="5" rx="1.5" fill="#0F766E"/>
  <rect x="53" y="46" width="3" height="5" rx="1.5" fill="#0F766E"/>

</svg>
